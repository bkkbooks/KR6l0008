  - {type: variant, offset: 4842, length: 93, content: 斯經序曰：其人忘因緣一品，故闕文焉。近有罽賓沙門曇摩卑諳之，來經密川，僧伽諦婆＝娑【三】婆【大】，娑【宋】【元】【明】婆娑譯出此品，八犍度文具也。而卑云：八犍度是體耳，別有六足，可百萬言。卑誦二足，今無譯，可出，慨恨良深。秦建元十五年正月十九日於揚州正官佛圖記, 宮: '', 聖: '', 聖乙: ''}
