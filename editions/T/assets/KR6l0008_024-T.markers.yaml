  - {type: variant, offset: 4822, length: 14, content: 阿毘曇根犍度緣跋渠＝因緣品【聖】【聖乙】根犍度緣跋渠【大】，因緣品【聖】【聖乙】根犍度緣跋渠因緣品第三十三竟＋（五百二十五首盧二萬一千言）【聖】【聖乙】竟【大】，竟五百二十五首盧二萬一千言【聖】【聖乙】竟竟五百二十五首盧二萬一千言, 宋: 阿毘曇論卷第二十四根揵度第六之四, 元: 阿毘曇論卷第二十四根揵度第六之四, 宮: 阿毘曇論卷第二十四根揵度第六之四, 明: ''}
