body:
  text: 阿毘曇八犍度論序釋道安撰阿毘曇者秦言大法也眾祐有以見道果之至賾擬性形容執乎真像謂之大也有以道慧之至齊觀如司南察乎一相謂之法故曰大法也中阿含世尊責優陀耶曰汝詰阿毘曇乎夫然佛以身子五法為大阿毘曇也戒定慧名無漏也佛般涅槃後迦旃延義第一以十部經浩博難究撰其大法為一部八犍度四十四品也其為經也富莫上焉邃莫加焉要道無行而不由可不謂之富乎至德無妙而不出可不謂之邃乎富邃洽備故故能微顯闡幽也其說智也周其說根也密其說禪也悉其說道也具周則二八用各適時密則二十迭為賓主悉則味淨遍遊其門具則利鈍各別其所以故為高座者所咨嗟三藏者所鼓舞也其身毒來諸沙門莫不祖述此經憲章鞞婆沙詠歌有餘味者也然乃在大荒之外葱嶺之表雖欲從之未由見也以建元十九年罽賓沙門僧伽禘婆誦此經甚利來詣長安比丘釋法和請令出之佛念譯傳慧力僧茂筆受和理其指歸自四月二十日出至十月二十三日乃訖其日撿挍譯人頗雜義辭龍蛇同淵金鍮共肆者救救如也和撫然恨之余亦深謂不可遂令更出夙夜匪懈四十六日而得盡定損可損者四卷焉至於事須懸解起盡之處皆為細其下梵本十五千七十二首盧四十八萬二千五百四言秦語十九萬五千二百五十言其人忘因緣一品云言數可與十門等也周覽斯經有碩人所尚者三焉以高座者尚其博以盡漏者尚其要以研機者尚其密密者龍象翹鼻鳴不造耳非人中之至恬其孰能與於此也要者八忍九斷巨細畢載非人中之至練其孰能致於此也博者眾微眾妙六八曲備非人中之至懿其孰能綜於此也其將來諸學者遊槃於其中何求而不得乎
