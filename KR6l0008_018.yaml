body:
  text: 迦旃延子造符秦罽賓三藏僧伽提婆共竺佛念譯四大犍度第五四大所造是謂緣也見諦成就自造在後淨根跋渠第一四大所造入幾可見幾不可見幾有對幾無對幾有漏幾無漏幾有為幾無為幾過去幾未來幾現在幾善幾不善幾無記幾欲界繫幾色界繫幾不繫幾學幾無學幾非學非無學幾思惟斷幾不斷入竟若成就四大彼造色成就耶設造色成就彼成就四大耶若不成就四大彼不成就造色耶設不成就造色彼不成就四大耶造色竟若成就四大彼成就善色耶設成就善色彼成就四大耶若成就四大彼成就不善色耶設成就不善色彼成就四大耶若成就四大彼成就隱沒無記色耶設成就隱沒無記色彼成就四大耶若成就四大彼成就不隱沒無記色耶設成就不隱沒無記色彼成就四大耶隻門竟若成就四大彼成就善不善色耶設成就善不善色彼成就四大耶若成就四大彼成就善隱沒無記色耶設成就善隱沒無記色彼成就四大耶若成就四大彼成就善不隱沒無記色耶設成就善不隱沒無記色彼成就四大若成就四大彼成就不善隱沒無記色耶設成就不善隱沒無記色彼成就四大耶若成就四大彼成就不善不隱沒無記色耶設成就不善不隱沒無記色彼成就四大耶若成就四大彼成就隱沒無記不隱沒無記色耶設成就隱沒無記不隱沒無記色彼成就四大耶雙竟若成就四大彼成就善不善隱沒無記色耶設成就善不善隱沒無記色彼成就四大耶若成就四大彼成就善不善不隱沒無記色耶設成就善不善不隱沒無記色彼成就四大耶若成就四大彼成就善隱沒無記不隱沒無記色耶設成就善隱沒無記不隱沒無記色彼成就四大耶若成就四大彼成就不善隱沒無記不隱沒無記色耶設成就不善隱沒無記不隱沒無記色彼成就四大耶三竟若成就四大彼成就善不善隱沒無記不隱沒無記色耶設成就善不善隱沒無記不隱沒無記色彼成就四大耶四大竟若成就善色彼成就不善色耶設成就不善色彼成就善色耶若成就善色彼成就隱沒無記色耶設成就隱沒無記色彼成就善色耶若成就善色彼成就不隱沒無記色設成就不隱沒無記色彼成就善色耶隻竟若成就善色彼成就不善隱沒無記色耶設成就不善隱沒無記色彼成就善色耶若成就善色彼成就不善不隱沒無記色耶設成就不善不隱沒無記色彼成就善色耶若成就善色彼成就隱沒無記不隱沒無記色耶設成就隱沒無記不隱沒無記色彼成就善色耶雙竟若成就善色彼成就不善隱沒無記不隱沒無記色耶設成就不善隱沒無記不隱沒無記色彼成就善色耶善竟若成就不善色彼成就隱沒無記色耶設成就隱沒無記色彼成就不善色耶若成就不善色彼成就不隱沒無記色耶設成就不隱沒無記色彼成就不善色耶若成就不善色彼成就隱沒無記不隱沒無記色耶設成就隱沒無記不隱沒無記色彼成就不善色耶不善竟若成就隱沒無記色彼成就不隱沒無記色耶設成就不隱沒無記色彼成就隱沒無記色耶四大由何三昧滅造色瞋恚有對更樂有覺有觀樂根苦根喜根憂根護根摶食更樂食意念食識食由何三昧滅四大已盡無餘當言作何果造色瞋恚有對更樂有覺有觀樂根苦根喜根憂根護根摶食樂食意念食識食由何三昧滅四大已盡無餘當言作何果此章義願具演說四大造入幾可見答曰一幾不可見答曰八二少入幾有對答曰九一少入幾無對答曰一少入幾有漏答曰九二少入幾無漏答曰一少入幾有為答曰九二少入幾過去答曰十一少入幾未來答曰十一少入幾現在答曰十一少入幾善答曰三少入幾不善答曰三少入幾無記答曰七三少入幾欲界繫答曰二九少入幾色界繫答曰九少入幾不繫答曰一少入幾學答曰一少入幾無學答曰一少入幾非學非無學耶答曰九二少入幾思惟斷答曰九二少入幾不斷答曰一少入入竟若成就四大彼成就造色耶答曰如是若成就四大彼成就造色頗成就造色非四大耶答曰有無垢人生無色界也若不成就四大彼不成就造色耶答曰如是若不成就造色彼不成就四大頗不成就四大非不造色耶答曰有無垢人生無色界造竟若成就四大彼成就善色耶答曰或成就四大非善色云何成就四大非善色答曰凡夫人處母胎卵膜漸厚若生欲界不戒律處善身口無教本有教便失不戒律不不戒律處善身口無教本有教便失是謂成就四大非善色云何成就善色非四大耶答曰無垢人生無色界是謂成就善色非四大云何成就四大善色答曰無垢人處母胎卵膜漸厚若生欲界戒律處不戒律處亦不戒律不不戒律處善身口有教本有教不失若生色界是謂成就四大善色也云何非成就四大非善色答曰凡夫人生無色界是謂非成就四大非善色若成就四大彼成就不善色耶答曰如是若成就不善色彼成就四大耶頗成就四大非不善色答曰有處母胎卵膜漸厚若生欲界戒律處不善身口無教本有教便失亦不戒律不不戒律處不善身口無教本有教便失若生色界耶若成就四大彼成就隱沒無記色耶答曰如是若成就隱沒無記色彼成就四大頗成就四大非隱沒無記色耶答曰有生欲界若生色界隱沒無記身口無教也若成就四大彼成就不隱沒無記色耶答曰如是設成就不隱沒無記色彼成就四大耶答曰如是隻竟若成就四大彼成就善不善色耶答曰或成就四大非善不善色及善色非不善色及不善色非善色及善不善色云何成就四大非善不善色耶答曰凡夫人處母胎卵膜漸厚若生欲界亦不戒律不不戒律處善不善身口無教本有教便失是謂成就四大非善不善色云何成就四大及善色非不善色答曰無垢人處母胎卵膜漸厚若生欲界戒律處不善身口無教本有教便